name: dbt build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt
        run: pip install -r requirements.txt

      - name: Write service account key from secret
        run: |
          mkdir -p .dbt
          echo "$GCP_SA_KEY" > .dbt/cms-analytics-sa.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Write profiles.yml
        run: |
          cat > .dbt/profiles.yml <<'EOF'
          cms_medicare:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                keyfile: ${{ github.workspace }}/.dbt/cms-analytics-sa.json
                project: cms-medicare-analytics
                dataset: warehouse_ci
                location: US
                threads: 4
                timeout_seconds: 300
                priority: interactive
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt seed
        run: dbt seed --target ci

      - name: dbt build
        run: dbt build --target ci
