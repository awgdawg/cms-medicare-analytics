version: 2

models:
  - name: dim_setting
    description: "2-row dimension: inpatient vs outpatient"
    columns:
      - name: setting_sk
        tests: [unique, not_null]
      - name: setting_code
        tests: [unique, not_null]

  - name: dim_geography
    description: "US states and territories, mapped to Census region/division"
    columns:
      - name: geo_sk
        tests: [unique, not_null]
      - name: state_code
        tests: [unique, not_null]

  - name: dim_provider
    description: "Distinct providers across both inpatient and outpatient sources"
    columns:
      - name: provider_sk
        tests: [unique, not_null]
      - name: provider_id
        tests: [unique, not_null]

  - name: dim_procedure
    description: "Distinct procedures (DRG for inpatient, APC for outpatient)"
    columns:
      - name: procedure_sk
        tests: [unique, not_null]
      - name: procedure_code
        tests: [not_null]
      - name: setting
        tests:
          - not_null
          - accepted_values:
              values: ['inpatient', 'outpatient']

  - name: fact_provider_procedure_year
    description: "One row per (provider, procedure, setting, year). Foreign keys to all 4 dims."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [provider_sk, procedure_sk, setting_sk, year]
    columns:
      - name: provider_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_provider')
              field: provider_sk
      - name: procedure_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_procedure')
              field: procedure_sk
      - name: geo_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_geography')
              field: geo_sk
      - name: setting_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_setting')
              field: setting_sk
      - name: year
        tests:
          - not_null
          - accepted_values:
              values: [2011, 2012, 2013, 2014, 2015]
              quote: false
      - name: avg_covered_charges
        tests:
          - not_null
