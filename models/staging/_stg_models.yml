version: 2

models:
  - name: stg_cms__inpatient_charges
    description: "Unioned + normalized inpatient charge rows across years 2011-2015"
    columns:
      - name: provider_id
        tests:
          - not_null
      - name: procedure_code_raw
        tests:
          - not_null
      - name: setting
        tests:
          - not_null
          - accepted_values:
              values: ['inpatient']
      - name: year
        tests:
          - not_null
          - accepted_values:
              values: [2011, 2012, 2013, 2014, 2015]
              quote: false
      - name: avg_covered_charges
        tests:
          - not_null

  - name: stg_cms__outpatient_charges
    description: "Unioned + normalized outpatient charge rows across years 2011-2015"
    columns:
      - name: provider_id
        tests:
          - not_null
      - name: procedure_code_raw
        tests:
          - not_null
      - name: setting
        tests:
          - not_null
          - accepted_values:
              values: ['outpatient']
      - name: year
        tests:
          - not_null
          - accepted_values:
              values: [2011, 2012, 2013, 2014, 2015]
              quote: false
      - name: avg_covered_charges
        tests:
          - not_null
